<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Store</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>My Store</h1>
    <p>Add products and save them online</p>
  </header>

  <main class="page">
    <section class="panel">
      <h2>Add Product</h2>

      <div class="form-grid">
        <input id="name" type="text" placeholder="Product name" />
        <input id="price" type="number" placeholder="Price" />
        <input id="image" type="text" placeholder="Image URL (optional)" />
        <button id="addBtn">Add Item</button>
      </div>

      <p id="status"></p>
    </section>

    <section class="panel">
      <h2>Products</h2>
      <div id="products" class="products"></div>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
